services:
  - type: web
    name: cristian-dev-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PGSSLMODE
        value: require
      - key: PGSSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_TO
        sync: false
      - key: MAIL_BRAND_IMAGE_URL
        sync: false
