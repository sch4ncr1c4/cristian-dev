services:
  - type: web
    name: cristian-dev-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: RESEND_TO
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_EXPECTED_HOSTNAME
        sync: false
      - key: TURNSTILE_EXPECTED_ACTION
        value: contact_form
